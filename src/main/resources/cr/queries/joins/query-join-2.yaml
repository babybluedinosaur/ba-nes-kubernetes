apiVersion: nebulastream.com/v1
kind: NesQuery
metadata:
  name: query-join-2
spec:
  query: "SELECT * FROM (SELECT * FROM stream) 
  INNER JOIN (SELECT * FROM stream2) 
  ON id = id2 
  WINDOW TUMBLING (timestamp, size 1 sec) 
  INTO fast_csv_sink;"
  nebuli:
    image: sidondocker/sido-nebuli
    args: "start"
