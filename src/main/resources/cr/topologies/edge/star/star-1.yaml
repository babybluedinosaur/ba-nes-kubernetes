apiVersion: nebulastream.com/v1
kind: NesTopology
metadata:
  name: star-1
  annotations:
    topology-file-name: star-1
spec:
  sinks:
    - name: fast_csv_sink
      type: Print
      config:
        inputFormat: CSV
      schema:
        - name: stream$id
          dataType: UINT64
        - name: stream$value
          dataType: UINT64
        - name: stream$timestamp
          dataType: UINT64
      host: worker-1
  logicalSources:
    - name: stream
      schema:
        - dataType: UINT64
          name: id
        - dataType: UINT64
          name: value
        - dataType: UINT64
          name: timestamp
  physicalSources:
    - logicalSource: stream
      host: worker-1
      parserConfig:
        type: CSV
      type: TCP
      sourceConfig:
        socketHost: tcp-server
        socketPort: 6666
        flushIntervalMS: 1
        socketType: SOCK_STREAM
        socketDomain: AF_INET
  workerNodes:
    - host: worker-1
      image: nebulastream/worker:v2distributed
      capacity: 100
      executionMode: INTERPRETER
