apiVersion: nebulastream.com/v1
kind: NesTopology
metadata:
  name: edgeless-1
  annotations:
    topology-file-name: edgeless-1
spec:
  nodes:
    - name: worker1
      image: nebulastream/worker:distributed
      capacity: 0
      buffers: 10
      sinks:
        - name: fast_csv_sink
          type: Print
          config:
            inputFormat: CSV