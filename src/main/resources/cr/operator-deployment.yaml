apiVersion: apps/v1
kind: Deployment
metadata:
  name: nes-operator
  labels:
    app: nes-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nes-operator
  template:
    metadata:
      labels:
        app: nes-operator
    spec:
      serviceAccountName: nes-operator-sa
      automountServiceAccountToken: true
      containers:
        - name: nes-operator
          image: docker.io/sidondocker/nes-k8s-operator:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 7000
---
apiVersion: v1
kind: Service
metadata:
  name: nes-operator-service
  labels:
    app: nes-operator
spec:
  type: NodePort
  selector:
    app: nes-operator
  ports:
    - protocol: TCP
      port: 7000
      targetPort: 7000
      nodePort: 30700
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nes-operator-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nes-operator-role
rules:
  - apiGroups: [ "nebulastream.com" ]
    resources:
      - "nes-topologies"
      - "nes-queries"
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  - apiGroups: [ "" ]
    resources:
      - "pods"
      - "services"
      - "configmaps"
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  - apiGroups: [ "apps" ]
    resources:
      - "deployments"
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  - apiGroups: [ "batch" ]
    resources:
      - jobs
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nes-operator-binding
subjects:
  - kind: ServiceAccount
    name: nes-operator-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: nes-operator-role
  apiGroup: rbac.authorization.k8s.io
