apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nes-topologies.nebulastream.com
spec:
  group: nebulastream.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object # the example yaml itself
          properties:
            spec: # object inside example yaml
              type: object
              properties: # properties of the object
                image:
                  type: string
                args:
                  type: array
                  items:
                    type: string
  scope: Namespaced
  names:
    plural: nes-topologies
    singular: nes-topology
    kind: NesTopology
    shortNames:
      - nt