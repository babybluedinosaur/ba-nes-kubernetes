apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nes-topologies.nebulastream.com
spec:
  group: nebulastream.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object # the example yaml itself
          properties:
            spec:
              type: object
              properties:
                workerSpecs:
                  type: array # we want several workers
                  items:
                    type: object
                    properties: # properties of the object
                      name:
                        type: string
                      image:
                        type: string
                      capacity:
                        type: integer
                      # sinks, physical
  scope: Namespaced
  names:
    plural: nes-topologies
    singular: nes-topology
    kind: NesTopology
    shortNames:
      - nt