apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nes-queries.nebulastream.com
spec:
  group: nebulastream.com
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: { }
      schema:
        openAPIV3Schema:
          type: object # the yaml itself
          properties:
            spec:
              type: object
              properties:
                query:
                  type: string
                nebuli:
                  type: object
                  properties:
                    image:
                      type: string
                    args:
                      type: string
                topologyName:
                  type: string
            status:
              type: object
              properties:
                deploymentName:
                  type: string
                status:
                  type: string
  scope: Namespaced
  names:
    plural: nes-queries
    singular: nes-query
    kind: NesQuery
    shortNames:
      - nq