apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nes-topologies.nebulastream.com
spec:
  group: nebulastream.com
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: { }
      additionalPrinterColumns:
        - name: READY
          type: integer
          description: "Ready workers"
          jsonPath: .status.readyWorkers
        - name: TOTAL
          type: integer
          description: "Total workers"
          jsonPath: .status.workers
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                sinks:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                logical:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                physical:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                workers:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                    properties:
                      host:
                        type: string
                      image:
                        type: string
                    required:
                      - host
                      - image
            status:
              type: object
              properties:
                workers:
                  type: integer
                readyWorkers:
                  type: integer
  scope: Namespaced
  names:
    plural: nes-topologies
    singular: nes-topology
    kind: NesTopology
    shortNames:
      - nt