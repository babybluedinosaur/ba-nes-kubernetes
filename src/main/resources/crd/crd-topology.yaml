apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nes-topologies.nebulastream.com
spec:
  group: nebulastream.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                sinks:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                logicalSources:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                physicalSources:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                workerNodes:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                    properties:
                      host:
                        type: string
                      image:
                        type: string
                    required:
                      - host
                      - image
  scope: Namespaced
  names:
    plural: nes-topologies
    singular: nes-topology
    kind: NesTopology
    shortNames:
      - nt