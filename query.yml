query: "SELECT ID, VALUE, TIMESTAMP\nFROM File(\n\t'/data/stream8.csv' AS `SOURCE`.FILE_PATH,\n\
  \t'CSV' AS PARSER.`TYPE`,\n\tSCHEMA(id UINT64 NOT NULL, value UINT64 NOT NULL, timestamp\
  \ UINT64 NOT NULL) AS `SOURCE`.`SCHEMA`,'worker-1-service:8080' AS `SOURCE`.`HOST`)\n\
  INTO Checksum('worker-1-service:8080' AS `SINK`.`HOST`,\n'/sink-output/sink-output.csv'\
  \ AS `SINK`.FILE_PATH,\n'CSV' AS `SINK`.OUTPUT_FORMAT);"
sinks:
  - config:
      file_path: "/sink-output/sink-output.csv"
      output_format: "CSV"
    host: "worker-1-service:8080"
    name: "Checksum"
    parser_config: {}
    schema:
      - name: "S$Count"
        nullable: false
        type: "UINT64"
      - name: "S$Checksum"
        nullable: false
        type: "UINT64"
    type: "CHECKSUM"
logical:
  - name: "1"
    schema:
      - name: "ID"
        nullable: false
        type: "UINT64"
      - name: "VALUE"
        nullable: false
        type: "UINT64"
      - name: "TIMESTAMP"
        nullable: false
        type: "UINT64"
physical:
  - host: "worker-1-service:8080"
    logical: "1"
    parser_config:
      field_delimiter: ","
      type: "CSV"
    source_config:
      file_path: "/data/stream8.csv"
    type: "FILE"
workers:
  - host: "worker-1-service:8080"
    data_address: "worker-1-service:9090"
    max_operators: 100